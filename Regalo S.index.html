<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es Hoy 🌻</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C518;
    --sunflower: #FFAA00;
    --petal: #FFD84D;
    --deep: #8B5E00;
    --cream: #FFF8E7;
    --green: #4A7C59;
    --leaf: #2E5E3A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Lato', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* === FONDO FLORAL === */
  .bg-petals {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-flower {
    position: absolute;
    font-size: 3rem;
    opacity: 0.12;
    animation: floatBg 12s ease-in-out infinite;
  }

  @keyframes floatBg {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-18px) rotate(10deg); }
  }

  /* === PANTALLA 1: CONTADOR === */
  #screen-counter {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .counter-box {
    text-align: center;
    animation: slideUp 1s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(80px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .title-es-hoy {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 7vw, 4.5rem);
    font-weight: 700;
    color: var(--deep);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 0.2em;
    text-shadow: 3px 3px 0 var(--petal);
  }

  .flower-accent {
    font-size: 1.6rem;
    display: inline-block;
    animation: spin 4s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .countdown-row {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    margin-top: 1.5rem;
    flex-wrap: nowrap;
  }

  .count-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .count-num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 700;
    color: var(--sunflower);
    background: white;
    border-radius: 14px;
    width: clamp(72px, 22vw, 100px);
    height: clamp(66px, 20vw, 90px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 20px rgba(245,197,24,0.25), 0 2px 0 var(--petal);
    border: 3px solid var(--petal);
  }

  .count-label {
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--deep);
    opacity: 0.7;
  }

  .colon {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--gold);
    line-height: clamp(66px, 20vw, 90px);
    font-weight: 700;
  }

  .petal-divider {
    margin: 2.5rem auto 0;
    font-size: 1.8rem;
    letter-spacing: 0.5rem;
    opacity: 0.5;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  /* === PANTALLA 2: PREGUNTA === */
  #screen-question {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 2rem;
  }

  .question-box {
    text-align: center;
    animation: slideUp 1s cubic-bezier(.22,1,.36,1) both;
    max-width: 600px;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    color: var(--deep);
    line-height: 1.4;
    margin-bottom: 3rem;
    text-shadow: 1px 1px 0 var(--petal);
  }

  .btn-group {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
  }

  .btn-si {
    padding: 1rem 3.5rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--sunflower));
    color: var(--deep);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(245,197,24,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    z-index: 2;
  }

  .btn-si:hover {
    transform: scale(1.07) translateY(-2px);
    box-shadow: 0 10px 30px rgba(245,197,24,0.5);
  }

  .btn-no {
    padding: 1rem 3rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--petal), var(--gold));
    color: var(--deep);
    border: 2px solid var(--sunflower);
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
    white-space: nowrap;
    user-select: none;
    box-shadow: 0 4px 15px rgba(245,197,24,0.3);
  }

  /* === PANTALLA 3: REGALO === */
  #screen-gift {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 2rem;
  }

  .bouquet-container {
    animation: slideUp 1s cubic-bezier(.22,1,.36,1) both;
    text-align: center;
  }

  .bouquet {
    position: relative;
    width: 280px;
    height: 300px;
    margin: 0 auto 2rem;
  }

  /* === SVG RAMO === */
  .bouquet svg {
    width: 100%;
    height: 100%;
    overflow: visible;
    filter: drop-shadow(0 12px 30px rgba(245,197,24,0.35));
  }

  .ted-msg {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3.5vw, 1.8rem);
    color: var(--deep);
    font-weight: 700;
    margin-bottom: 1.5rem;
    background: white;
    border: 2px solid var(--petal);
    border-radius: 20px;
    padding: 0.7rem 1.5rem;
    box-shadow: 0 4px 15px rgba(245,197,24,0.2);
    animation: slideUp 1s cubic-bezier(.22,1,.36,1) both;
  }

  .miss-you {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(2.2rem, 6vw, 4rem);
    color: var(--deep);
    letter-spacing: 1px;
    animation: fadeInText 1.5s ease 0.5s both;
    text-shadow: 2px 2px 0 var(--petal);
  }

  @keyframes fadeInText {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Pétalos flotantes en pantalla regalo */
  .floating-petal {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    animation: fallDown linear infinite;
    z-index: 0;
  }

  @keyframes fallDown {
    from { transform: translateY(-60px) rotate(0deg); opacity: 1; }
    to   { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* === DECORACIÓN LATERAL === */
  .side-flowers {
    position: fixed;
    bottom: 0;
    left: 0;
    pointer-events: none;
    z-index: 0;
    font-size: 5rem;
    opacity: 0.18;
    line-height: 1;
  }
  .side-flowers-right {
    position: fixed;
    bottom: 0;
    right: 0;
    pointer-events: none;
    z-index: 0;
    font-size: 5rem;
    opacity: 0.18;
    line-height: 1;
  }

  .hearts {
    font-size: 1.2rem;
    color: var(--sunflower);
    margin-top: 1rem;
    letter-spacing: 6px;
    animation: pulse 1.8s ease-in-out infinite;
  }
</style>
</head>

<script>
  // ---- Fondo decorativo ----
  const emojis = ['🌻','🌼','✨','🌸','💛'];
  const bg = document.getElementById('bgPetals');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'bg-flower';
    el.textContent = emojis[i % emojis.length];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top  = Math.random() * 100 + 'vh';
    el.style.fontSize = (2 + Math.random() * 3) + 'rem';
    el.style.animationDuration = (8 + Math.random() * 8) + 's';
    el.style.animationDelay = (-Math.random() * 8) + 's';
    bg.appendChild(el);
  }

  // ---- Contador animado que baja a cero ----
  const dEl = document.getElementById('days');
  const hEl = document.getElementById('hours');
  const mEl = document.getElementById('minutes');

  let d = 3;
  let h = 3;
  let m = 24;

  function pad(n) { return String(n).padStart(2,'0'); }

  dEl.textContent = pad(d);
  hEl.textContent = pad(h);
  mEl.textContent = pad(m);

  function tick() {
    if (m > 0) { m--; }
    else if (h > 0) { h--; m = 59; }
    else if (d > 0) { d--; h = 23; m = 59; }

    dEl.textContent = pad(d);
    hEl.textContent = pad(h);
    mEl.textContent = pad(m);

    if (d === 0 && h === 0 && m === 0) {
      clearInterval(ticker);
      setTimeout(goToQuestion, 1200);
    }
  }

  const ticker = setInterval(tick, 3);

  function goToQuestion() {
    const c = document.getElementById('screen-counter');
    c.style.animation = 'slideUp 0.8s cubic-bezier(.22,1,.36,1) reverse both';
    setTimeout(() => {
      c.style.display = 'none';
      const q = document.getElementById('screen-question');
      q.style.display = 'flex';
    }, 700);
  }

  // ---- Botón NO que huye ----
  const btnNo = document.getElementById('btnNo');
  const btnGroup = document.getElementById('btnGroup');
  let noMoved = false;

  let noEscaped = false;

  function moveNo() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const btnW = 140;
    const btnH = 60;
    const margin = 10;

    if (!noEscaped) {
      const rect = btnNo.getBoundingClientRect();
      btnNo.style.position = 'fixed';
      btnNo.style.left = rect.left + 'px';
      btnNo.style.top = rect.top + 'px';
      noEscaped = true;
    }

    const siRect = document.querySelector('.btn-si').getBoundingClientRect();
    let x, y, tries = 0;
    do {
      x = margin + Math.random() * (vw - btnW - margin * 2);
      y = margin + Math.random() * (vh - btnH - margin * 2);
      tries++;
      const overlapsSi = (x < siRect.right + 60 && x + btnW > siRect.left - 60 &&
                          y < siRect.bottom + 40 && y + btnH > siRect.top - 40);
      if (!overlapsSi) break;
    } while (tries < 25);

    btnNo.style.left = x + 'px';
    btnNo.style.top = y + 'px';
    btnNo.style.transform = 'rotate(' + (Math.random() * 16 - 8) + 'deg)';
  }

  // ---- Mostrar regalo ----
  function showGift() {
    const q = document.getElementById('screen-question');
    q.style.animation = 'slideUp 0.8s cubic-bezier(.22,1,.36,1) reverse both';
    setTimeout(() => {
      q.style.display = 'none';
      btnNo.style.display = 'none';

      // Pétalos cayendo
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'floating-petal';
        p.textContent = ['🌻','🌼','💛','✨'][Math.floor(Math.random()*4)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = '-60px';
        p.style.fontSize = (1.2 + Math.random()*1.5) + 'rem';
        p.style.animationDuration = (4 + Math.random()*5) + 's';
        p.style.animationDelay = (Math.random()*3) + 's';
        document.body.appendChild(p);
      }

      const g = document.getElementById('screen-gift');
      g.style.display = 'flex';
    }, 700);
  }
</script>
</body>
</html>
